<html><head>
<style>
  body {
  background-color:#457d7b ;
}
        .snowflake {
            position: fixed;
            top: -10px;
            color: white;
            font-size: 1em;
            font-family: Arial, sans-serif;
            text-shadow: 0 0 5px rgba(255,255,255,0.7);
            filter: drop-shadow(0 0 10px white);
            cursor: default;
            user-select: none;
            z-index: 999999;
            pointer-events: none;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes snowfall {
            0% {
                transform: translateY(0vh) translateX(0) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) translateX(20px) rotate(360deg);
            }
        }

        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999999;
        }
    
     .suggestions {
            border: 1px solid #ccc;
            display: none;
            position: absolute;
            background: white;
            z-index: 1000;
        }
        .suggestions div {
            padding: 8px;
            cursor: pointer;
        }
        .suggestions div:hover {
            background: #f0f0f0;
        }

</style>
</head><body><form>
      <label for="fruit-input">Choose a fruit:</label>
    <input type="text" id="fruit-input" autocomplete="on">
    <div class="suggestions" id="suggestions"></div>

    <script>
        const fruits = ["deviation",
"course",
"replacement",
"moot",
"final",
"postwar",
"immobile",
"unopened",
"broadband",
"assertion",
"soiled",
"podium",
"kiss",
"wax",
"underage",
"scare",
"misread",
"cross-examination",
"affordable",
"sunflower",
"relaxation",
"oblige",
"experience",
"sailing",
"socialization",
"reconciliation",
"departed",
"resonance",
"sob",
"butter",
"canister",
"conserve",
"substance",
"nod",
"inertia",
"quarterback",
"nipple",
"proactive",
"re-emerge",
"complicate",
"caravan",
"embattled",
"boot",
"baritone",
"rudimentary",
"getaway",
"smug",
"balding",
"discontent",
"buckle",
"pony",
"explode",
"smoky",
"scalp",
"hold",
"heartbreaking",
"weekly",
"magnolia",
"resort",
"undertake",
"salmon",
"saving",
"ponder",
"witty",
"all-time",
"comprehend",
"uncle",
"payment",
"sister-in-law",
"eternity",
"inanimate",
"coercive",
"tailor",
"cable",
"sublime",
"working",
"grown",
"chalk",
"italian",
"horseback",
"linear",
"grinding",
"underserved",
"birthright",
"stiletto",
"sector",
"spotty",
"ballot",
"experiment",
"creator",
"glitch",
"booking",
"theater",
"turpentine",
"realm",
"antagonistic",
"shaggy"];
        const input = document.getElementById('fruit-input');
        const suggestions = document.getElementById('suggestions');

        input.addEventListener('input', function() {
            const value = this.value.toLowerCase();
            suggestions.innerHTML = '';
            if (value) {
                const filteredFruits = fruits.filter(fruit => fruit.toLowerCase().includes(value));
                filteredFruits.forEach(fruit => {
                    const div = document.createElement('div');
                    div.textContent = fruit;
                    div.addEventListener('click', function() {
                        input.value = fruit;
                        suggestions.innerHTML = '';
                    });
                    suggestions.appendChild(div);
                });
                suggestions.style.display = filteredFruits.length ? 'block' : 'none';
            } else {
                suggestions.style.display = 'none';
            }
        });

        document.addEventListener('click', function(event) {
            if (event.target !== input) {
                suggestions.style.display = 'none';
            }
        });
    </script>
</form>

</body></html>
